<html lang="zh-CN">
<head>

<style>
/* 样式保持不变，省略... 请使用您原有的样式 */
*{box-sizing:border-box}
body{
    margin:0;
    padding:30px;
    font-family:Arial,sans-serif;

.refresh-note{

}
.allowed-types{

}
.limit-info{

}

}
.settings-panel{

}
.settings-panel h4{
    margin:0 0 12px 0;

}
.settings-row{
    display:flex;
    gap:12px;
    align-items:center;

}
.settings-row label{
    min-width:140px;
}
.settings-row input,.settings-row select{
    width:auto;

}
.system-badge{
    font-size:10px;
    background:rgba(100,100,100,0.5);
    padding:2px 6px;
    border-radius:10px;
    margin-left:8px;
}
button:disabled{
    opacity:0.5;
    cursor:not-allowed;
}
.ip-info{
    font-size:12px;
    color:#86efac;
    margin-top:5px;
}
</style>
</head>
<body>
<div class="container">

<div class="card">
<h2>登录</h2>
<input id="password" type="password" placeholder="输入密码">
<button class="primary" onclick="login()">登录</button>
<div id="msg"></div>
</div>

<div id="app">

<div class="card">
<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;">
<div style="display:flex;align-items:center;gap:10px;">
<h3 id="role" style="margin:0"></h3>
<button class="primary" style="background:#059669;padding:8px 12px;font-size:14px;" onclick="showPermissions()">权限信息</button>
<button id="adminSettingsBtn" class="primary" style="background:#475569;padding:8px 12px;font-size:14px;display:none;" onclick="toggleSettings()">⚙️ 上传限制设置</button>
</div>
<button class="danger" onclick="logout()">登出</button>
</div>

<div id="uploadLimitInfo" class="limit-info" style="margin-top:12px;"></div>
<div id="ipInfo" class="ip-info"></div>

<input type="file" id="fileInput" accept=".txt,.md,.html,.css,.js,.json,.xml,.csv,.log">
<button class="primary" id="uploadBtn" onclick="uploadFile()">上传文件</button>
<div class="file-types-note">
    📋 允许上传的类型：<span class="allowed-types">.txt .md .html .css .js .json .xml .csv .log</span>
    <br>⚠️ 其他类型文件可能会上传失败或被拒绝
</div>
</div>

<div class="card">
<h3>自定义上传</h3>
<div style="display:flex;gap:10px;margin-bottom:10px;">
<input id="customFileName" type="text" placeholder="输入文件名" style="flex:1">
<span style="align-self:center">.txt</span>
</div>
<textarea id="customFileContent" placeholder="输入文件内容" style="height:100px;margin-bottom:10px;"></textarea>
<button class="primary" id="customUploadBtn" onclick="uploadCustomFile()">上传</button>
<div class="file-types-note" style="margin-top:8px;">
    💡 自定义上传会自动添加 .txt 后缀，仅支持文本内容
</div>
</div>

<!-- 管理员设置面板 -->
<div id="settingsPanel" class="settings-panel">
    <h4>🔧 上传限制配置（基于IP，所有人共享次数）</h4>
    <div class="settings-row">
        <label>🚫 禁止上传：</label>
        <select id="uploadBlocked">
            <option value="false">否 - 允许上传</option>
            <option value="true">是 - 禁止所有上传</option>
        </select>
    </div>
    <div class="settings-row">
        <label>👑 对管理员生效：</label>
        <select id="applyToAdmin">
            <option value="true">是 - 管理员也受限制</option>
            <option value="false">否 - 管理员不受限制</option>
        </select>
    </div>
    <div class="settings-row">
        <label>⏱️ 两次上传最小间隔（秒）：</label>
        <input type="number" id="cooldownSeconds" min="5" max="3600" value="30" step="5">
        <span>秒</span>
    </div>
    <div class="settings-row">
        <label>📊 时间窗口（小时）：</label>
        <input type="number" id="windowHours" min="1" max="168" value="12" step="1">
        <span>小时</span>
    </div>
    <div class="settings-row">
        <label>🔢 窗口内最大上传次数：</label>
        <input type="number" id="maxUploadsPerWindow" min="1" max="100" value="30" step="1">
        <span>次</span>
    </div>
    <div class="settings-row">
        <button class="primary" onclick="saveLimitConfig()">💾 保存配置</button>
        <button onclick="loadLimitConfig()">🔄 刷新配置</button>
        <span id="configSaveMsg" style="font-size:12px;"></span>
    </div>
    <div style="font-size:12px;color:#94a3b8;margin-top:12px;">
        💡 配置保存在 Gist 的 upload_limit_config.json 文件中<br>
        🌐 限制基于IP地址，管理员和普通用户共享同一个IP的上传次数统计
    </div>
</div>

<div class="card">
<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;">
    <h3 style="margin:0">📁 文件列表</h3>
    <div style="display:flex;align-items:center;gap:12px;">
        <button class="primary" onclick="loadFiles()" style="background:#475569;padding:6px 14px;font-size:14px;">🔄 手动刷新</button>
        <span class="refresh-note">💡 提示：删除或上传后列表无变化时，请点击手动刷新</span>

</div>

</div>

<footer>
<a href="https://beian.miit.gov.cn/" target="_blank">
粤 ICP 备 2025404694 号-1
</a>
</footer>

<script>
const GIST_ID = "afbccc0822195aebb3bb21742579bf88";
const CONFIG_FILE_NAME = "upload_limit_config.json";
const UPLOAD_LOG_FILE_NAME = "upload_log_ip.json";
const SYSTEM_FILES = [CONFIG_FILE_NAME, UPLOAD_LOG_FILE_NAME, "time.json"];

// AES-CBC-PKCS7 加密后的 Token
const USER_TOKEN_AES = "QCa4797ci8xmMn5eae1MLM6Wm7LnsNj7VrNH/kNOknviU+fQh37yHSaIU5ClaHMs";
const ADMIN_TOKEN_AES = "H52TGMxFu7ILPL4UMA/ISuPFZP4lTQlEA9p2pUM0Z/Gc2Me7VhL0if26XAj8Zb64";

// SHA256(Token)
const USER_TOKEN_HASH = "7abce28c8b8efd9f600ac0787194424ea1edb066dec8c6266d354845afb480c4";
const ADMIN_TOKEN_HASH = "7abce28c8b8efd9f600ac0787194424ea1edb066dec8c6266d354845afb480c4";

// AES IV（16字节）
const AES_IV = "1234567890123456"; 

// 允许上传的文件扩展名
const ALLOWED_EXTENSIONS = ['.txt', '.md', '.html', '.css', '.js', '.json', '.xml', '.csv', '.log'];

let currentToken = "";
let isAdmin = false;
let refreshTimer = null;
let isUploading = false;
let isDeleting = false;
let isRefreshing = false;

// 当前IP地址
let currentIP = "";
let currentIPType = "";

// 上传限制配置（默认值）
let limitConfig = {
    uploadBlocked: false,
    applyToAdmin: false,
    cooldownSeconds: 30,
    windowHours: 12,
    maxUploadsPerWindow: 30
};

// 基于IP的上传记录
let uploadLog = {};

// ========== 带 Token 的 fetch 请求 ==========
async function fetchWithToken(url, options = {}) {
    const headers = {
        "Authorization": `Bearer ${currentToken}`,
        "Accept": "application/vnd.github.v3+json",
        ...options.headers
    };
    
    const response = await fetch(url, {
        ...options,
        headers: headers
    });
    
    // 检查限流
    if(response.status === 403) {
        const remaining = response.headers.get('X-RateLimit-Remaining');
        if(remaining === '0') {
            const resetTime = response.headers.get('X-RateLimit-Reset');
            if(resetTime) {
                const resetDate = new Date(parseInt(resetTime) * 1000);
                console.warn(`⚠️ API限流！重置时间: ${resetDate.toLocaleTimeString()}`);
                alert(`⚠️ API限流！请等待至 ${resetDate.toLocaleTimeString()}`);
            }
        }
    }
    return response;
}

// ========== 获取当前IP地址 ==========
async function getCurrentIP() {
    const ipServices = [
        { name: 'ipv6', url: 'https://api6.ipify.org?format=json', type: 'ipv6' },
        { name: 'ipv4', url: 'https://api.ipify.org?format=json', type: 'ipv4' },
        { name: 'ipv4-backup', url: 'https://ipapi.co/json/', type: 'ipv4' }
    ];
    
    for (const service of ipServices) {
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 3000);
            const response = await fetch(service.url, { signal: controller.signal });
            clearTimeout(timeoutId);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            let ip = data.ip || data.ipv6 || data.ipv4;
            if (ip) {
                currentIP = ip;
                currentIPType = service.type;
                const ipDisplay = currentIPType === 'ipv6' ? `IPv6: ${ip.substring(0, 20)}...` : `IPv4: ${ip}`;
                document.getElementById("ipInfo").innerHTML = `🌐 当前${ipDisplay}`;
                return currentIP;
            }
        } catch(e) {
            continue;
        }
    }
    currentIP = "unknown";
    document.getElementById("ipInfo").innerHTML = `⚠️ 无法获取IP`;
    return currentIP;
}

function isSystemFile(fileName) {
    return SYSTEM_FILES.includes(fileName);
}

function checkSystemFile(fileName, operation) {
    if(isSystemFile(fileName)) {
        alert(`🔒 系统提示：不可${operation}系统文件\n\n文件名：${fileName}`);
        return false;
    }
    return true;
}

// ========== 从 Gist 加载配置（使用 Token）==========
async function loadLimitConfig() {
    try {
        const r = await fetchWithToken(`https://api.github.com/gists/${GIST_ID}?_=${Date.now()}`);
        const gist = await r.json();
        
        if(gist.files[CONFIG_FILE_NAME]) {
            const config = JSON.parse(gist.files[CONFIG_FILE_NAME].content);
            limitConfig = { ...limitConfig, ...config };
            console.log("✅ 已加载上传限制配置:", limitConfig);
        }
        
        if(gist.files[UPLOAD_LOG_FILE_NAME]) {
            uploadLog = JSON.parse(gist.files[UPLOAD_LOG_FILE_NAME].content);
            const thirtyDaysAgo = Date.now() - 30 * 24 * 3600 * 1000;
            for(const ip in uploadLog) {
                uploadLog[ip] = uploadLog[ip].filter(log => log.timestamp > thirtyDaysAgo);
                if(uploadLog[ip].length === 0) delete uploadLog[ip];
            }
            console.log("✅ 已加载IP上传记录，共", Object.keys(uploadLog).length, "个IP");
        }
        
        if(isAdmin) {
            document.getElementById("uploadBlocked").value = limitConfig.uploadBlocked;
            document.getElementById("applyToAdmin").value = limitConfig.applyToAdmin;
            document.getElementById("cooldownSeconds").value = limitConfig.cooldownSeconds;
            document.getElementById("windowHours").value = limitConfig.windowHours;
            document.getElementById("maxUploadsPerWindow").value = limitConfig.maxUploadsPerWindow;
        }
        
        updateUploadLimitDisplay();
        return true;
    } catch(e) {
        console.error("加载配置失败:", e);
        return false;
    }
}

// ========== 保存配置到 Gist（使用 Token）==========
async function saveLimitConfig() {
    if(!isAdmin) {
        alert("只有管理员可以修改配置");
        return;
    }
    
    const newConfig = {
        uploadBlocked: document.getElementById("uploadBlocked").value === "true",
        applyToAdmin: document.getElementById("applyToAdmin").value === "true",
        cooldownSeconds: parseInt(document.getElementById("cooldownSeconds").value),
        windowHours: parseInt(document.getElementById("windowHours").value),
        maxUploadsPerWindow: parseInt(document.getElementById("maxUploadsPerWindow").value),
        lastModified: new Date().toISOString(),
        modifiedBy: "admin"
    };
    
    try {
        const getRes = await fetchWithToken(`https://api.github.com/gists/${GIST_ID}`);
        const gist = await getRes.json();
        
        const files = {};
        for(const name in gist.files) {
            if(name !== CONFIG_FILE_NAME) {
                files[name] = { content: gist.files[name].content };
            }
        }
        files[CONFIG_FILE_NAME] = { content: JSON.stringify(newConfig, null, 2) };
        
        const r = await fetchWithToken(`https://api.github.com/gists/${GIST_ID}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ files: files })
        });
        
        if(r.ok) {
            limitConfig = newConfig;
            document.getElementById("configSaveMsg").innerText = "✅ 保存成功";
            setTimeout(() => {
                document.getElementById("configSaveMsg").innerText = "";
            }, 2000);
            updateUploadLimitDisplay();
            alert("配置已保存");
        } else {
            alert("保存失败");
        }
    } catch(e) {
        alert("保存失败: " + e.message);
    }
}

// ========== 记录上传 ==========
async function logUpload(fileName) {
    if(!currentIP) await getCurrentIP();
    
    const logEntry = {
        fileName: fileName,
        timestamp: Date.now(),
        date: new Date().toISOString(),
        role: isAdmin ? "admin" : "user"
    };
    
    if(!uploadLog[currentIP]) {
        uploadLog[currentIP] = [];
    }
    uploadLog[currentIP].push(logEntry);
    
    const thirtyDaysAgo = Date.now() - 30 * 24 * 3600 * 1000;
    uploadLog[currentIP] = uploadLog[currentIP].filter(log => log.timestamp > thirtyDaysAgo);
    
    try {
        const getRes = await fetchWithToken(`https://api.github.com/gists/${GIST_ID}`);
        const gist = await getRes.json();
        
        const files = {};
        for(const name in gist.files) {
            if(name !== UPLOAD_LOG_FILE_NAME) {
                files[name] = { content: gist.files[name].content };
            }
        }
        files[UPLOAD_LOG_FILE_NAME] = { content: JSON.stringify(uploadLog, null, 2) };
        
        await fetchWithToken(`https://api.github.com/gists/${GIST_ID}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ files: files })
        });
        console.log("✅ 上传记录已保存");
    } catch(e) {
        console.error("保存上传记录失败:", e);
    }
}

function getCurrentIPLog() {
    if(!currentIP) return [];
    return uploadLog[currentIP] || [];
}

function canUpload() {
    if(limitConfig.uploadBlocked) {
        if(limitConfig.applyToAdmin || !isAdmin) {
            return { allowed: false, reason: "🚫 管理员已禁止上传" };
        }
    }
    
    if(isAdmin && !limitConfig.applyToAdmin) {
        return { allowed: true, reason: "" };
    }
    
    const now = Date.now();
    const ipLog = getCurrentIPLog();
    
    if(ipLog.length > 0) {
        const lastUpload = ipLog[ipLog.length - 1];
        const secondsSinceLast = (now - lastUpload.timestamp) / 1000;
        if(secondsSinceLast < limitConfig.cooldownSeconds) {
            const waitSeconds = Math.ceil(limitConfig.cooldownSeconds - secondsSinceLast);
            return { allowed: false, reason: `⏱️ 请等待 ${waitSeconds} 秒` };
        }
    }
    
    const windowMs = limitConfig.windowHours * 3600 * 1000;
    const windowStart = now - windowMs;
    const uploadsInWindow = ipLog.filter(log => log.timestamp > windowStart).length;
    
    if(uploadsInWindow >= limitConfig.maxUploadsPerWindow) {
        return { allowed: false, reason: `📊 ${limitConfig.windowHours}小时内已达 ${uploadsInWindow}/${limitConfig.maxUploadsPerWindow} 次` };
    }
    
    return { allowed: true, reason: "" };
}

function updateUploadLimitDisplay() {
    const infoDiv = document.getElementById("uploadLimitInfo");
    const status = canUpload();
    const windowMs = limitConfig.windowHours * 3600 * 1000;
    const ipLog = getCurrentIPLog();
    const uploadsInWindow = ipLog.filter(log => log.timestamp > Date.now() - windowMs).length;
    const adminUploads = ipLog.filter(log => log.timestamp > Date.now() - windowMs && log.role === "admin").length;
    const userUploads = ipLog.filter(log => log.timestamp > Date.now() - windowMs && log.role === "user").length;
    
    let html = `
        <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;">
            <span>📊 ${limitConfig.windowHours}小时内共上传: <strong>${uploadsInWindow}</strong> / ${limitConfig.maxUploadsPerWindow} 次</span>
            <span>⏱️ 间隔: ${limitConfig.cooldownSeconds}秒</span>
        </div>
        <div style="font-size:12px;">（管理员:${adminUploads} 用户:${userUploads}）</div>
    `;
    
    if(!status.allowed && !(isAdmin && !limitConfig.applyToAdmin && !limitConfig.uploadBlocked)) {
        html += `<div style="color:#f87171;margin-top:8px;">⚠️ ${status.reason}</div>`;
        document.getElementById("uploadBtn").disabled = true;
        document.getElementById("customUploadBtn").disabled = true;
    } else {
        document.getElementById("uploadBtn").disabled = false;
        document.getElementById("customUploadBtn").disabled = false;
    }
    
    infoDiv.innerHTML = html;
}

// ========== 页面加载时自动恢复登录状态 ==========
window.addEventListener("load", function(){
    const savedToken = sessionStorage.getItem("currentToken");
    const savedIsAdmin = sessionStorage.getItem("isAdmin");
    
    if(savedToken && savedIsAdmin !== null){
        currentToken = savedToken;
        isAdmin = savedIsAdmin === "true";
        startApp();
        document.getElementById("password").value = "";
    }
});

function isAllowedFile(fileName){
    const ext = fileName.substring(fileName.lastIndexOf('.')).toLowerCase();
    return ALLOWED_EXTENSIONS.includes(ext);
}

async function sha256(text){
    const data = new TextEncoder().encode(text);
    const hashBuffer = await crypto.subtle.digest("SHA-256", data);
    return Array.from(new Uint8Array(hashBuffer)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

function decryptToken(cipher,key){
    const decrypted = CryptoJS.AES.decrypt(cipher, CryptoJS.enc.Utf8.parse(key), {
        iv: CryptoJS.enc.Utf8.parse(AES_IV),
        mode: CryptoJS.mode.CBC,
        padding: CryptoJS.pad.Pkcs7
    });
    return decrypted.toString(CryptoJS.enc.Utf8);
}

async function login(){
    const password = document.getElementById("password").value;

    try{
        const token = decryptToken(USER_TOKEN_AES,password);
        if(await sha256(token)===USER_TOKEN_HASH){
            currentToken=token;
            isAdmin=false;
            sessionStorage.setItem("currentToken", token);
            sessionStorage.setItem("isAdmin", "false");
            startApp();
            document.getElementById("msg").innerText="✅ 普通用户登录成功！";
            return;
        }
    }catch(e){}

    try{
        const token = decryptToken(ADMIN_TOKEN_AES,password);
        if(await sha256(token)===ADMIN_TOKEN_HASH){
            currentToken=token;
            isAdmin=true;
            sessionStorage.setItem("currentToken", token);
            sessionStorage.setItem("isAdmin", "true");
            startApp();
            document.getElementById("msg").innerText="✅ 管理员登录成功！";
            return;
        }
    }catch(e){}

    document.getElementById("msg").innerText="❌ 密码错误";
}

async function startApp(){
    await getCurrentIP();
    await loadLimitConfig();
    document.getElementById("app").style.display="block";
    document.getElementById("role").innerText = isAdmin ? "👑 管理员" : "👤 普通用户";
    
    if(isAdmin) {
        document.getElementById("adminSettingsBtn").style.display = "inline-block";
    }
    
    loadFiles();
    setInterval(updateUploadLimitDisplay, 5000);
}

function showPermissions(){
    alert(`身份: ${isAdmin ? "管理员" : "普通用户"}\nIP: ${currentIP}\n\n管理员可修改配置、删除文件\n管理员和用户共享IP上传次数`);
}

function toggleSettings(){
    document.getElementById("settingsPanel").classList.toggle("show");
}

function logout(){
    if(refreshTimer) clearTimeout(refreshTimer);
    refreshTimer = null;
    currentToken = "";
    isAdmin = false;
    sessionStorage.removeItem("currentToken");
    sessionStorage.removeItem("isAdmin");
    document.getElementById("app").style.display="none";
    document.getElementById("password").value = "";
    document.getElementById("msg").innerText="已登出";
}

function scheduleRefresh(){
    if(refreshTimer) clearTimeout(refreshTimer);
    refreshTimer = setTimeout(() => {
        loadFiles();
        refreshTimer = null;
    }, 500);
}

// ========== 核心修改：loadFiles 使用 Token 认证 ==========
async function loadFiles(){
    if(isRefreshing) return;
    isRefreshing = true;
    
    try {
        // 使用 Token 认证的请求
        const r = await fetchWithToken(`https://api.github.com/gists/${GIST_ID}?_=${Date.now()}`);
        const gist = await r.json();

        let html = "";
        for(const fileName in gist.files){
            if(!isAdmin && isSystemFile(fileName)) continue;
            
            const isSysFile = isSystemFile(fileName);
            const sysBadge = (isSysFile && isAdmin) ? '<span class="system-badge">🔒 系统文件</span>' : '';
            const safeFileName = fileName.replace(/'/g, "\\'");
            
            html += `
            <div class="file">
                <span class="filename"
                      onclick="${isSysFile && !isAdmin ? '' : `readFile('${safeFileName}')`}"
                      style="${isSysFile && !isAdmin ? 'cursor:default;color:#64748b;' : ''}">
                      ${escapeHtml(fileName)} ${sysBadge}
                </span>
                <div style="display:flex;gap:8px;">
                    <button class="primary" style="background:#059669;"
                            onclick="downloadFile('${safeFileName}')"
                            ${isSysFile && !isAdmin ? 'disabled' : ''}>
                            下载
                    </button>
                    ${isAdmin && !isSysFile ? `<button class="danger" onclick="deleteFile('${safeFileName}')">删除</button>` : ""}
                </div>
            </div>`;
        }

        document.getElementById("files").innerHTML = html || "<div style='text-align:center;padding:20px;'>📭 暂无文件</div>";
        
        // 显示剩余API次数
        if(r.headers && r.headers.get('X-RateLimit-Remaining')) {
            const remaining = r.headers.get('X-RateLimit-Remaining');
            if(parseInt(remaining) % 100 === 0) {
                console.log(`📊 API剩余次数: ${remaining}/5000`);
            }
        }
    } catch(e) {
        console.error("加载失败:", e);
        document.getElementById("files").innerHTML = "<div style='text-align:center;padding:20px;color:#f87171;'>⚠️ 加载失败，请检查Token是否有效</div>";
    } finally {
        isRefreshing = false;
    }
}

function escapeHtml(str){
    return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
}

async function readFile(fileName){
    if(!isAdmin && isSystemFile(fileName)) {
        alert("不可查看系统文件");
        return;
    }
    const r = await fetchWithToken(`https://api.github.com/gists/${GIST_ID}?_=${Date.now()}`);
    const gist = await r.json();
    document.getElementById("viewer").value = gist.files[fileName]?.content || "";
}

async function downloadFile(fileName){
    if(!isAdmin && isSystemFile(fileName)) {
        alert("不可下载系统文件");
        return;
    }
    const r = await fetchWithToken(`https://api.github.com/gists/${GIST_ID}`);
    const gist = await r.json();
    const content = gist.files[fileName]?.content;
    if(!content) return;
    const blob = new Blob([content], {type: 'text/plain'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = fileName;
    a.click();
    URL.revokeObjectURL(a.href);
}

async function uploadFile() {
    if(isUploading) { alert("请稍后"); return; }
    const limitCheck = canUpload();
    if(!limitCheck.allowed) { alert(limitCheck.reason); return; }
    
    const file = document.getElementById("fileInput").files[0];
    if(!file) return;
    if(!checkSystemFile(file.name, "上传")) {
        document.getElementById("fileInput").value = "";
        return;
    }
    if(!isAllowedFile(file.name)){
        alert(`不支持的文件类型！允许: ${ALLOWED_EXTENSIONS.join(', ')}`);
        document.getElementById("fileInput").value = "";
        return;
    }
    
    isUploading = true;
    const btn = document.getElementById("uploadBtn");
    btn.disabled = true;
    btn.textContent = "⏳ 上传中...";
    try {
        const content = await file.text();
        const r = await fetchWithToken(`https://api.github.com/gists/${GIST_ID}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ files: { [file.name]: { content } } })
        });
        if(r.ok){
            await logUpload(file.name);
            alert("✅ 上传成功");
            document.getElementById("fileInput").value = "";
            scheduleRefresh();
            updateUploadLimitDisplay();
        } else {
            alert("❌ 上传失败");
        }
    } catch(e) {
        alert("上传异常: " + e.message);
    } finally {
        isUploading = false;
        btn.disabled = false;
        btn.textContent = "上传文件";
    }
}

async function uploadCustomFile(){
    if(isUploading) { alert("请稍后"); return; }
    const limitCheck = canUpload();
    if(!limitCheck.allowed) { alert(limitCheck.reason); return; }
    
    const fileName = document.getElementById("customFileName").value.trim();
    const content = document.getElementById("customFileContent").value;
    if(!fileName){ alert("请输入文件名"); return; }
    if(!content){ alert("请输入内容"); return; }
    const fullFileName = fileName + ".txt";
    if(!checkSystemFile(fullFileName, "上传")) return;
    
    isUploading = true;
    const btn = document.getElementById("customUploadBtn");
    btn.disabled = true;
    btn.textContent = "⏳ 上传中...";
    try {
        const r = await fetchWithToken(`https://api.github.com/gists/${GIST_ID}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ files: { [fullFileName]: { content } } })
        });
        if(r.ok){
            await logUpload(fullFileName);
            alert("✅ 上传成功");
            document.getElementById("customFileName").value = "";
            document.getElementById("customFileContent").value = "";
            scheduleRefresh();
            updateUploadLimitDisplay();
        } else {
            alert("上传失败");
        }
    } catch(e) {
        alert("上传异常: " + e.message);
    } finally {
        isUploading = false;
        btn.disabled = false;
        btn.textContent = "上传";
    }
}

async function deleteFile(fileName){
    if(isSystemFile(fileName)) {
        alert("不可删除系统文件");
        return;
    }
    if(!isAdmin) { alert("无权限"); return; }
    if(isDeleting) { return; }
    
    try {
        const getRes = await fetchWithToken(`https://api.github.com/gists/${GIST_ID}`);
        const gist = await getRes.json();
        const visibleFiles = Object.keys(gist.files).filter(f => !isSystemFile(f));
        if(visibleFiles.length === 1 && visibleFiles[0] === fileName){
            alert("无法删除最后一个文件");
            return;
        }
        if(!confirm(`删除 "${fileName}"？`)) return;
        
        isDeleting = true;
        const r = await fetchWithToken(`https://api.github.com/gists/${GIST_ID}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ files: { [fileName]: null } })
        });
        if(r.ok){
            alert("✅ 删除成功");
            scheduleRefresh();
        } else {
            alert("删除失败");
        }
    } catch(e) {
        alert("删除异常: " + e.message);
    } finally {
        isDeleting = false;
    }
}
